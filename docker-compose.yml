version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: safechat_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - safechat_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safechat_backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/safechat
      - JWT_SECRET=super_secret_jwt_key_change_in_production
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - safechat_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safechat_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - safechat_network

networks:
  safechat_network:
    driver: bridge

volumes:
  mongodb_data:
